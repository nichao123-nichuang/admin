<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台</title>
<style>
:root{--p:#6366f1;--s:#10b981;--e:#ef4444;--b:#1e293b;--bc:#334155;--text:#e2e8f0;--t:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:var(--b);color:var(--text);min-height:100vh}
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bc);padding:2rem;border-radius:16px;width:100%;max-width:360px}
h1{text-align:center;color:var(--p);margin-bottom:0.5rem}
.sub{text-align:center;color:var(--t);margin-bottom:1.5rem}
.f{margin-bottom:1rem}
.f l{display:block;margin-bottom:0.5rem;color:var(--t)}
.f i{width:100%;padding:0.75rem;border:1px solid #475569;border-radius:8px;background:var(--b);color:var(--text)}
.b{width:100%;padding:0.75rem;border:none;border-radius:8px;background:var(--p);color:#fff;cursor:pointer}
.e{color:var(--e);text-align:center;margin-top:1rem}
.hidden{display:none}
#adminPage{display:flex;min-height:100vh}
.s{width:200px;background:#0f172a;padding:1rem}
.s h2{color:var(--p);margin-bottom:1.5rem;text-align:center}
.n{padding:0.75rem;border-radius:8px;cursor:pointer;color:var(--t);margin-bottom:0.25rem}
.n:hover{background:#1e293b}
.n.active{background:var(--p);color:#fff}
.fy{margin-top:auto;padding-top:1rem;border-top:1px solid #334155}
.fy button{width:100%;padding:0.5rem;background:transparent;border:1px solid #475569;border-radius:8px;color:var(--t);cursor:pointer}
.m{flex:1;padding:1.5rem;overflow-y:auto}
.title{font-size:1.5rem;margin-bottom:1rem}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1rem}
.c{background:var(--bc);padding:1rem;border-radius:12px;text-align:center}
.c .v{font-size:2rem;color:var(--p)}
.c .l{color:var(--t);margin-top:0.25rem}
.card{background:var(--bc);padding:1rem;border-radius:12px;margin-bottom:1rem}
.card h3{margin-bottom:0.75rem}
.r{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.75rem;margin-bottom:0.75rem}
select{width:100%;padding:0.5rem;border:1px solid #475569;border-radius:6px;background:var(--b);color:var(--text)}
table{width:100%;border-collapse:collapse}
th,td{padding:0.75rem;text-align:left;border-bottom:1px solid #475569}
th{background:#1e293b}
.bt{padding:0.4rem 0.75rem;border-radius:6px;border:none;cursor:pointer}
.bd{background:var(--e);color:#fff}
.bs{background:var(--s);color:#fff}
.bp{background:var(--p);color:#fff}
.badge{display:inline-block;padding:0.2rem 0.5rem;border-radius:99px;font-size:0.7rem}
.b-ok{background:var(--s);color:#fff}
.b-us{background:#6b7280;color:#fff}
.b-pe{background:#f59e0b;color:#000}
#toast{position:fixed;bottom:1rem;right:1rem;padding:0.75rem 1rem;border-radius:8px;color:#fff;z-index:9999}
.t-ok{background:var(--s)}.t-er{background:var(--e)}.t-in{background:#3b82f6}
.t{text-align:center;padding:2rem;color:var(--t)}
</style>
</head>
<body>
<div id="loginPage">
<div class="login-box">
<h1>管理员登录</h1>
<p class="sub">Ni创·AI文游平台</p>
<form id="loginForm">
<div class="f"><l>密码</l><input type="password" id="pwd" required></div>
<button type="submit" class="b">登录</button>
</form>
<p class="e" id="err"></p>
</div>
</div>
<div id="adminPage" class="hidden">
<div class="s">
<h2>管理后台</h2>
<div class="n active" data-p="d">仪表盘</div>
<div class="n" data-p="c">兑换码</div>
<div class="n" data-p="s">剧本</div>
<div class="n" data-p="g">设置</div>
<div class="fy"><button onclick="lg()">退出</button></div>
</div>
<div class="m">
<div id="p-d" class="pg">
<h1 class="title">数据概览</h1>
<div class="g">
<div class="c"><div class="v" id="tc">-</div><div class="l">总码</div></div>
<div class="c"><div class="v" id="uc">-</div><div class="l">已用</div></div>
<div class="c"><div class="v" id="as">-</div><div class="l">会话</div></div>
<div class="c"><div class="v" id="ps">-</div><div class="l">待审</div></div>
<div class="c"><div class="v" id="ap">-</div><div class="l">已过</div></div>
<div class="c"><div class="v" id="rj">-</div><div class="l">已拒</div></div>
</div>
</div>
<div id="p-c" class="pg hidden">
<h1 class="title">兑换码</h1>
<div class="card">
<h3>生成</h3>
<div class="r">
<select id="plt"><option value="deepseek">DeepSeek</option><option value="openai">OpenAI</option><option value="tongyi">通义</option><option value="glm">GLM</option><option value="moonshot">Moonshot</option></select>
<select id="trn"><option value="100">100</option><option value="500">500</option><option value="1000">1000</option></select>
<select id="cnt"><option value="1">1</option><option value="10">10</option><option value="20">20</option><option value="50">50</option></select>
</div>
<button class="b bs" onclick="gn()">生成</button>
</div>
<div class="card">
<h3>列表</h3>
<table><thead><tr><th>码</th><th>平台</th><th>回</th><th>状</th><th>操作</th></tr></thead><tbody id="tbl"></tbody></table>
</div>
</div>
<div id="p-s" class="pg hidden">
<h1 class="title">剧本审核</h1>
<div id="scs"></div>
</div>
<div id="p-g" class="pg hidden">
<h1 class="title">设置</h1>
<div class="card"><h3>改密</h3><div class="r"><input type="password" id="op" placeholder="旧"><input type="password" id="np" placeholder="新"></div><button class="b bp" onclick="cp()">修改</button></div>
</div>
</div>
</div>
<div id="toast" class="hidden"></div>
<script>
let t=localStorage.getItem('at')||new URLSearchParams(location.search).get('adminToken');
function $(i){return document.getElementById(i)}
function to(m,ty){ty=ty||'in';var o=$('toast');o.textContent=m;o.className=ty;o.style.display='block';setTimeout(function(){o.style.display='none'},2500)}
async function api(u,o){o=o||{};var r=await fetch(u,{method:o.method||'GET',body:o.body,headers:{'Content-Type':'application/json','x-admin-token':t}});var d=await r.json();if(!r.ok)throw new Error(d.error||'错');return d}
if(t){$('loginPage').classList.add('hidden');$('adminPage').classList.remove('hidden');ld()}
$('loginForm').onsubmit=function(e){e.preventDefault();api('/api/admin/login',{method:'POST',body:JSON.stringify({password:$('pwd').value})}).then(function(d){t=d.adminToken;localStorage.setItem('at',t);$('loginPage').classList.add('hidden');$('adminPage').classList.remove('hidden');ld();to('成功','t-ok')}).catch(function(x){$('err').textContent=x.message})}
function lg(){t='';localStorage.removeItem('at');location.href='admin.html'}
document.querySelectorAll('.n').forEach(function(i){i.onclick=function(){$('.n.active').classList.remove('active');this.classList.add('active');$('.pg').forEach(function(p){p.classList.add('hidden')});$('p-'+this.dataset.p).classList.remove('hidden');if(this.dataset.p=='d')ld();if(this.dataset.p=='c')lc();if(this.dataset.p=='s')ls()}});
async function ld(){try{var s=await api('/api/admin/stats');$('tc').textContent=s.totalCodes;$('uc').textContent=s.usedCodes;$('as').textContent=s.activeSessions;$('ps').textContent=s.pendingScripts;$('ap').textContent=s.approvedScripts;$('rj').textContent=s.rejectedScripts}catch(x){to(x.message,'t-er')}}
var ac=[];
async function lc(){try{var d=await api('/api/admin/codes');ac=d.codes||[];rc(ac)}catch(x){to(x.message,'t-er')}}
function rc(cs){$('tbl').innerHTML=cs.length?cs.map(function(c){return'<tr><td>'+c.code+'</td><td>'+c.platform+'</td><td>'+c.turns+'</td><td><span class="badge '+(c.used?'b-us':'b-ok')+'">'+(c.used?'已用':'可用')+'</span></td><td><button class="bt bd" onclick="dl(\"'+c.code+'\")">删</button></td></tr>'}).join(''):'<tr><td colspan="5" class="t">无</td></tr>'}
async function gn(){try{var d=await api('/api/admin/generate-codes',{method:'POST',body:JSON.stringify({platformId:$('plt').value,turns:parseInt($('trn').value),count:parseInt($('cnt').value)})});to('生成'+d.codes.length+'个','t-ok');lc();navigator.clipboard.writeText(d.codes.join('\n'));to('已复制','t-ok')}catch(x){to(x.message,'t-er')}}
async function dl(c){if(!confirm('删'+c+'?'))return;try{await api('/api/admin/codes/'+c,{method:'DELETE'});to('已删','t-ok');lc()}catch(x){to(x.message,'t-er')}}
async function ls(){try{var d=await api('/api/admin/scripts/pending');$('scs').innerHTML=d.scripts&&d.scripts.length?d.scripts.map(function(s){return'<div class="card"><div class="t">'+(s.author||'匿名')+'| '+(s.createdAt||'')+'</div><div>'+(s.content||'').substring(0,300)+'</div><div style="margin-top:0.5rem"><button class="bt bs" onclick="rv('+s.id+',\"approve\")">通</button> <button class="bt bd" onclick="rv('+s.id+',\"reject\")">拒</button></div></div>'}).join(''):'<div class="t">无待审</div>'}catch(x){to(x.message,'t-er')}}
async function rv(id,act){try{await api('/api/admin/script/review',{method:'POST',body:JSON.stringify({id:id,action:act})});to(act=='approve'?'已通':'已拒','t-ok');ls()}catch(x){to(x.message,'t-er')}}
async function cp(){try{await api('/api/admin/change-password',{method:'POST',body:JSON.stringify({oldPassword:$('op').value,newPassword:$('np').value})});to('已改','t-ok')}catch(x){to(x.message,'t-er')}}
</script>
</body>
</html>
